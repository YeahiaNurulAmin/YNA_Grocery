<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Animations -->
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }
      
      @keyframes bounce {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      
      @keyframes fadeInOut {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 0.8; }
      }
      
      @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      
      @keyframes scaleUp {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      
      .cart-main {
        animation: float 3s ease-in-out infinite;
      }
      
      .leaf-1 {
        animation: rotate 20s linear infinite;
        transform-origin: center;
      }
      
      .leaf-2 {
        animation: rotate 15s linear infinite reverse;
        transform-origin: center;
      }
      
      .dots {
        animation: fadeInOut 2s ease-in-out infinite;
      }
      
      .shadow {
        animation: scaleUp 3s ease-in-out infinite;
      }
    </style>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="#e8f5e9" opacity="0.5"/>
  
  <!-- Decorative Circles -->
  <circle cx="80" cy="100" r="40" fill="#22c55e" opacity="0.1" class="dots"/>
  <circle cx="320" cy="280" r="50" fill="#ff6b35" opacity="0.1" class="dots" style="animation-delay: 1s;"/>
  
  <!-- Floating Leaf 1 -->
  <g class="leaf-1" transform="translate(100, 80)">
    <ellipse cx="0" cy="0" rx="15" ry="25" fill="#22c55e" opacity="0.3"/>
    <path d="M 0 -25 Q 0 0, 0 25" stroke="#16a34a" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Floating Leaf 2 -->
  <g class="leaf-2" transform="translate(300, 320)">
    <ellipse cx="0" cy="0" rx="12" ry="20" fill="#ff6b35" opacity="0.3"/>
    <path d="M 0 -20 Q 0 0, 0 20" stroke="#ff5722" stroke-width="2" opacity="0.4"/>
  </g>
  
  <!-- Shadow under cart -->
  <ellipse cx="200" cy="320" rx="100" ry="15" fill="#cbd5e1" opacity="0.3" class="shadow"/>
  
  <!-- Main Cart Animation Group -->
  <g class="cart-main">
    <!-- Empty Shopping Cart -->
    <g transform="translate(100, 140)">
      <!-- Cart Body -->
      <path d="M 20 40 L 30 100 L 170 100 L 180 40 Z" 
        fill="none" 
        stroke="#22c55e" 
        stroke-width="4" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
      
      <!-- Cart Grid Lines -->
      <line x1="45" y1="45" x2="50" y2="95" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
      <line x1="70" y1="42" x2="73" y2="98" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
      <line x1="100" y1="42" x2="100" y2="98" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
      <line x1="130" y1="42" x2="127" y2="98" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
      <line x1="155" y1="45" x2="150" y2="95" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
      
      <!-- Horizontal Lines -->
      <line x1="25" y1="60" x2="175" y2="60" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
      <line x1="27" y1="80" x2="173" y2="80" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
      
      <!-- Cart Handle -->
      <path d="M 30 40 Q 100 -20, 170 40" 
        stroke="#22c55e" 
        stroke-width="5" 
        stroke-linecap="round" 
        fill="none"/>
      
      <!-- Cart Wheels -->
      <circle cx="60" cy="110" r="8" fill="none" stroke="#22c55e" stroke-width="3"/>
      <circle cx="60" cy="110" r="3" fill="#22c55e"/>
      
      <circle cx="140" cy="110" r="8" fill="none" stroke="#22c55e" stroke-width="3"/>
      <circle cx="140" cy="110" r="3" fill="#22c55e"/>
    </g>
    
    <!-- Empty Box Icon Inside Cart -->
    <g transform="translate(170, 200)">
      <rect x="0" y="0" width="60" height="50" rx="4" 
        fill="none" 
        stroke="#64748b" 
        stroke-width="2" 
        stroke-dasharray="4 4"
        opacity="0.5"/>
      <line x1="10" y1="10" x2="50" y2="40" stroke="#64748b" stroke-width="2" opacity="0.3"/>
      <line x1="50" y1="10" x2="10" y2="40" stroke="#64748b" stroke-width="2" opacity="0.3"/>
    </g>
  </g>
  
  <!-- Sad Face Icon -->
  <g transform="translate(200, 100)">
    <circle cx="0" cy="0" r="25" fill="#cbd5e1" opacity="0.3"/>
    <circle cx="-8" cy="-5" r="3" fill="#64748b" opacity="0.6"/>
    <circle cx="8" cy="-5" r="3" fill="#64748b" opacity="0.6"/>
    <path d="M -10 10 Q 0 5, 10 10" stroke="#64748b" stroke-width="2" stroke-linecap="round" opacity="0.6" fill="none"/>
  </g>
  
  <!-- Text -->
  <text x="200" y="360" 
    font-family="Arial, sans-serif" 
    font-size="24" 
    font-weight="700" 
    fill="#1e293b" 
    text-anchor="middle">
    Your Cart is Empty
  </text>
  
  <text x="200" y="385" 
    font-family="Arial, sans-serif" 
    font-size="14" 
    font-weight="400" 
    fill="#64748b" 
    text-anchor="middle">
    Add some fresh items to get started!
  </text>
</svg>